specVersion: "3.0"
type: application
metadata:
  name: chatbot.ui
resources:
  configuration:
    paths:
      webapp: webapp
framework:
  name: OpenUI5
  version: "1.150.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: ui5-middleware-livereload
      afterMiddleware: compression
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /api
      configuration:
        baseUri: http://localhost:3001